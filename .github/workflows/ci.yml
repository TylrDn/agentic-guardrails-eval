name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest fastapi httpx pydantic python-dotenv openai langsmith
      - run: pip install presidio-analyzer presidio-anonymizer
      - run: python -m spacy download en_core_web_lg
      - run: pytest tests/ -v
